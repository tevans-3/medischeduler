spring.application.name=medischeduler-routeservice
server.port=8081

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
spring.kafka.auto.create.topics.enable=false
spring.kafka.producer.linger.ms=10
spring.kafka.producer.batch.size=32768
spring.kafka.producer.retries=5
spring.kafka.producer.retry-backoff=100
spring.kafka.producer.acks=all
spring.kafka.producer.max-in-flight=1
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.consumer.group-id=student_teacher_pairs
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.apache.kafka.common.serialization.Serdes$StringSerde

# Redis (credentials via environment variables — never hardcode)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.username=${REDIS_USERNAME:default}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.jedis.pool.max-active=10
spring.data.redis.jedis.pool.max-idle=5
spring.data.redis.jedis.pool.min-idle=1
spring.data.redis.jedis.pool.max-wait=3000ms

# Routes API (configure with your actual API key via environment variable)
routes-api.api-key=${ROUTES_API_KEY:}
routes-api.field-mask-bikeMode=originIndex,destinationIndex,distanceMeters,duration,condition,status
routes-api.field-mask-driveMode=originIndex,destinationIndex,distanceMeters,duration,condition,status
routes-api.field-mask-walkMode=originIndex,destinationIndex,distanceMeters,duration,condition,status
routes-api.field-mask-transitMode=originIndex,destinationIndex,distanceMeters,duration,condition,status

# Google OAuth2 (configure with your Google Cloud Console client ID)
google.client-id=${GOOGLE_CLIENT_ID:}
