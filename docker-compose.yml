services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=false
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - CLUSTER_ID=MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - ./kafka-data:/var/lib/kafka/data
    networks:
      - container

  kafka-init:
    image: apache/kafka:latest
    container_name: kafka-init
    command: >
      /bin/bash -c "
        echo 'Waiting for Kafka to be ready...'
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --list 2>/dev/null; do
          echo 'Kafka not ready yet, retrying in 5s...'
          sleep 5
        done
        echo 'Kafka is ready. Creating topics...'
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic MATCH_TOPIC --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic ROUTE_MATRIX_TOPIC --partitions 1 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic OPTIMAL_ASSIGNMENTS_TOPIC --partitions 1 --replication-factor 1
        echo 'All topics created successfully.'
      "
    depends_on:
      kafka:
        condition: service_started
    networks:
      - container

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - container

  routeservice:
    image: routeservice:latest
    build:
      context: ./backend
      dockerfile: routeservice/Dockerfile
    container_name: routeservice
    ports:
      - "8081:8081"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_USERNAME=${REDIS_USERNAME:-default}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - ROUTES_API_KEY=${ROUTES_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - container

  schedulerservice:
    image: schedulerservice:latest
    build:
      context: ./backend
      dockerfile: schedulerservice/Dockerfile
    container_name: schedulerservice
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_USERNAME=${REDIS_USERNAME:-default}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      redis:
        condition: service_started
    networks:
      - container

networks:
  container:
    driver: bridge