version: '3.8'
services:
  zookeeper: 
    image: bitnami/zookeeper:latest
    container_name: zookeeper
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
    ports:
      - "2181:2181"
    volumes:
      - ./zk-data:/bitnami/zookeeper

  kafka:
    image: bitnami/kafka:latest
    container_name: kafka 
    depends_on: 
      - zookeeper 
    ports:
      - "9092:9092"
    environment: 
      - KAFKA_BROKER_ID=1
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    volumes: 
      - ./kafka-data:/bitnami/kafka  
  kafka-init:
    image: docker.io/bitnami/kafka:3
    networks:
      - container 
    command: ["/bin/bash", "-c", "/create_topic.sh"]
    environment: 
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - MATCH_TOPIC=potential-match
      - ROUTE_MATRIX_TOPIC=route-matrix
      - OPTIMAL_ASSIGNMENTS_TOPIC=optimal-assignments
    depends_on: 
      kafka:
        condition: service_started
    volumes:
      - type: bind
        source: ./create_topic.sh
        target: /create_topic.sh
    init: true 

  redis: 
    image: redis 
    ports:
      - "6379:6379"

  routeservice: 
    build:
      context: "./backend/routeservice"
    ports:
      - "8081:8080"
  
  schedulerservice: 
    build:
      context: ./backend/schedulerservice
    ports:
      - "8082:8080"
